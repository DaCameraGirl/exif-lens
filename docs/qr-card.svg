<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="360" height="420" viewBox="0 0 360 420" role="img" aria-label="Scan QR code to open EXIF Lens">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="100%" stop-color="#12102a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4ff4d" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4ff4d" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a8e635" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="360" height="420" rx="22" fill="url(#cardBg)"/>
  <rect x="1.5" y="1.5" width="357" height="417" rx="20.5" fill="none" stroke="#d4ff4d" stroke-width="2" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.7;0.35" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="-80" y="180" width="120" height="4" rx="2" fill="url(#glow)">
    <animate attributeName="x" values="-80;360;-80" dur="5s" repeatCount="indefinite"/>
  </rect>
  <text x="180" y="52" fill="#f8fbff" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="800" text-anchor="middle">Scan to open</text>
  <text x="180" y="78" fill="#9db4d1" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="500" text-anchor="middle">EXIF Lens on your phone</text>
  <rect x="32" y="98" width="296" height="296" rx="18" fill="#0e0e10" stroke="#d4ff4d" stroke-width="1.5" opacity="0.55"/>
  <image x="32" y="98" width="296" height="296" href="site-qr.svg" preserveAspectRatio="xMidYMid meet"/>
  <text x="180" y="418" fill="#6b7280" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle">dacameragirl.github.io/exif-lens</text>
</svg>